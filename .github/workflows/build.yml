name: Build

on:
  push:
    branches: [main]
    paths:
      - 'claude-pokemon/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build + sign + package
        run: make package

      - name: Verify signature
        run: codesign -dv build/ClaudePokemon.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudePokemon-${{ github.sha }}
          path: build/ClaudePokemon.app.zip
          retention-days: 14
